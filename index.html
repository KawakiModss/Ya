<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpeg" href="https://files.catbox.moe/1bdpm6.jpg">
<title>Hiroko - Website Official</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background-color: #0f0f0f;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
}

.loading-container {
    position: relative;
    width: 250px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.logo-wrapper {
    position: relative;
    display: block;
    overflow: hidden;
    border-radius: 10px;
    width: 150px;
}

.logo-img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: contain;
}

.logo-wrapper::after {
    content: '';
    position: absolute;
    top: 0;
    left: -150%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        to right,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.8) 50%,
        rgba(255,255,255,0) 100%
    );
    transform: skewX(-25deg);
    animation: loading-shimmer 1.5s infinite;
}

@keyframes loading-shimmer {
    0% { left: -150%; }
    100% { left: 150%; }
}

.slogan {
    color: #FACC15;
    margin-top: 15px;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    line-height: 1.6;
    animation: fadeInUp 1s ease-out;
}

.loading-text {
    color: #666;
    margin-top: 15px;
    text-align: center;
    font-size: 10px;
    letter-spacing: 2px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="loading-container">
    <div class="logo-wrapper">
        <img src="https://files.catbox.moe/defcsh.jpg" alt="Kawaki Logo" class="logo-img">
    </div>
    <div class="loading-text">
        TUNGGU SEBENTAR YA,<br>LAGI LOADING...
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Redirect setelah 10 detik (ubah sesuai kebutuhan)
    setTimeout(() => {
        // window.location.href = 'profile.html'; // aktifkan kalo ada file profile.html
        console.log("Redirect ke profile.html (dinonaktifkan sementara)");
    }, 10000);
});
</script>
</body>
</html>
