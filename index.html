<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background-color: #0f0f0f;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
}

.loading-container {
    position: relative;
    width: 250px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.logo-wrapper {
    position: relative;
    display: block;
    overflow: hidden;
    border-radius: 10px;
    width: 150px;
}

.logo-img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: contain;
}

.logo-wrapper::after {
    content: '';
    position: absolute;
    top: 0;
    left: -150%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        to right,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.8) 50%,
        rgba(255,255,255,0) 100%
    );
    transform: skewX(-25deg);
    animation: loading-shimmer 1.5s infinite;
}

@keyframes loading-shimmer {
    0% { left: -150%; }
    100% { left: 150%; }
}

.loading-text {
    color: #666;
    margin-top: 15px;
    text-align: center;
    font-size: 10px;
    letter-spacing: 2px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
}
</style>
</head>
<body>
<div class="loading-container">
    <div class="logo-wrapper">
        <img src="https://files.catbox.moe/defcsh.jpg" alt="Logo" class="logo-img">
    </div>
    <div class="loading-text">
        TUNGGU SEBENTAR YA,<br>LAGI LOADING...
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        // Redirect ke profile.html (biarkan seperti ini atau hapus)
        window.location.href = 'profile.html';
    }, 10000);
});
</script>
</body>
